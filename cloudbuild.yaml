# =============================================================================
# Cloud Build Configuration for ZENITH Fitness API
# Builds, pushes, and deploys to Cloud Run
# =============================================================================

steps:
  # Step 1: Build Docker image with commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/zenith-fitness-492214/zenith-fitness/zenith-fitness-api:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/zenith-fitness-492214/zenith-fitness/zenith-fitness-api:latest'
      - '-f'
      - 'server/Dockerfile'
      - 'server'

  # Step 2: Push image with commit SHA tag to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/zenith-fitness-492214/zenith-fitness/zenith-fitness-api:$COMMIT_SHA'

  # Step 3: Push image with latest tag to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/zenith-fitness-492214/zenith-fitness/zenith-fitness-api:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'zenith-fitness-api'
      - '--image'
      - 'asia-south1-docker.pkg.dev/zenith-fitness-492214/zenith-fitness/zenith-fitness-api:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--set-env-vars'
      - 'NODE_ENV=production'

# Images to be pushed to Artifact Registry
images:
  - 'asia-south1-docker.pkg.dev/zenith-fitness-492214/zenith-fitness/zenith-fitness-api:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/zenith-fitness-492214/zenith-fitness/zenith-fitness-api:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY

# Timeout for the entire build (10 minutes)
timeout: '600s'
