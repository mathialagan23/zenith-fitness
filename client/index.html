<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ZENITH - Fitness Tracker</title>
    <meta name="description" content="Premium dark-themed fitness tracking app for diet, workouts, and progress" />
    <meta name="author" content="ZENITH Fitness" />
    <meta name="theme-color" content="#0a0a0f" />
    
    <!-- Mobile app capability -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZENITH" />
    <meta name="application-name" content="ZENITH" />
    <meta name="msapplication-TileColor" content="#0a0a0f" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Open Graph -->
    <meta property="og:title" content="ZENITH - Fitness Tracker" />
    <meta property="og:description" content="Track your diet, workouts, and progress with ZENITH fitness app" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/og-image.png" />
    <meta property="og:url" content="https://zenith.fitness" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZENITH - Fitness Tracker" />
    <meta name="twitter:description" content="Track your diet, workouts, and progress with ZENITH fitness app" />
    <meta name="twitter:image" content="/icons/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/fav.ico" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    
    <!-- Preconnect to API (update with your production URL) -->
    <link rel="preconnect" href="http://localhost:5000" />
    
    <!-- Font preloading for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- No-JS fallback -->
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;color:#fff;font-family:system-ui;text-align:center;padding:20px;">
        <div>
          <h1>JavaScript Required</h1>
          <p>ZENITH Fitness Tracker requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
