<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bgGrad)"/>
  
  <!-- Glow effect ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#purpleGrad)" stroke-width="8" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Z letter stylized -->
  <g filter="url(#glow)">
    <path d="M160 150 L352 150 L352 185 L220 327 L352 327 L352 362 L160 362 L160 327 L292 185 L160 185 Z" 
          fill="url(#purpleGrad)"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="380" cy="140" r="12" fill="#22d3ee" opacity="0.8"/>
  <circle cx="132" cy="372" r="8" fill="#f43f5e" opacity="0.8"/>
</svg>
